version: "3.8"

services:
  mongo:
    image: mongo:6
    container_name: mongo
    ports:
      - "27018:27017"
    volumes:
      - mongo_data:/data/db

  app:
    build: .
    container_name: calamity-app
    ports:
      - "5000:5000"
    depends_on:
      - mongo
    env_file:
      - .env

volumes:
  mongo_data: